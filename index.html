<!DOCTYPE html>
<html>

<head>
<title>Dreamchaser Fishing 🎣</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>🎣 Dreamchaser Fishing 🐟</h1>
<p>The social network for fishermen</p>
</header>

<div class="post-box">

<h2>Create a Catch</h2>

<input id="fishName" placeholder="Fish name">

<input id="weight" placeholder="Weight (lbs)">

<textarea id="story" placeholder="Fishing story"></textarea>

<input id="image" type="file">

<button class="post-btn" onclick="addPost()">
Post Catch 🎣
</button>

</div>


<div id="feed"></div>


<div id="trophy"></div>


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="supabase.js"></script>

<script src="script.js"></script>

</body>

</html>
