<!DOCTYPE html>
<html>

<head>
<title>Dreamchaser Fishing 🎣</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
<div id="loginPage">
  
  <h1>🎣 Dreamchaser Fishing</h1>

<p>The social network for fishermen</p>

<input id="email" placeholder="Email">

<input id="password" type="password" placeholder="Password">
  
<button onclick="login()">
Login
</button>

<h3>Create Account</h3>

<button onclick="signup()">
Sign Up
</button>

</div>
  
<div id="app" style="display:none;">
  <header>
<h1>🎣 Dreamchaser Fishing 🐟</h1>
<p>The social network for fishermen</p>
    
</header>

<div class="post-box">

<h2>Create a Catch</h2>

<input id="fishName" placeholder="Fish name">

<input id="weight" placeholder="Weight (lbs)">

<textarea id="story" placeholder="Fishing story"></textarea>

<input id="image" type="file">

<button class="post-btn" onclick="addPost()">
Post Catch 🎣
</button>

</div>


<div id="feed"></div>

<div id="trophy"></div>

<div id="profile"> 

  <img id="profileImage" src="" width="120">

<h3 id="profileUsername">Angler</h3>

<p id="profileBio"></p>

<p>🐟 Favorite Fish:
<span id="favoriteFish">Bass</span>
</p>

<p>🏆 Biggest Catch:
<span id="biggestCatch">Not added yet</span>
</p>

</div>
  
</div> <!-- Close app -->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="script.js"></script>

</body>
</html>

</body>

</html>
